<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boston Events — Brian</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #0f0f0f; color: #e8e8e8; margin: 0; padding: 24px; }
  h1   { font-size: 1.4rem; font-weight: 600; color: #fff; margin: 0 0 4px; }
  .sub { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
  .day-section { margin-bottom: 32px; }
  .day-header  { font-size: 1rem; font-weight: 700; color: #f0a500;
                  text-transform: uppercase; letter-spacing: 0.05em;
                  border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 12px; }
  .card        { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
                  padding: 14px 16px; margin-bottom: 10px; }
  .card:hover  { border-color: #444; }
  .card-title  { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .score       { background: #f0a500; color: #000; font-size: 0.7rem; font-weight: 700;
                  padding: 2px 7px; border-radius: 99px; margin-left: 8px;
                  vertical-align: middle; }
  .meta        { font-size: 0.82rem; color: #888; margin-bottom: 4px; }
  .reason      { font-size: 0.82rem; color: #aaa; margin: 4px 0; }
  .link        { font-size: 0.78rem; color: #4a9eff; word-break: break-all;
                  text-decoration: none; }
  .link:hover  { text-decoration: underline; }
  .today-tag   { background: #2a6e2a; color: #7fff7f; font-size: 0.65rem; font-weight: 700;
                  padding: 2px 8px; border-radius: 99px; margin-left: 10px;
                  vertical-align: middle; letter-spacing: 0.05em; }
  .legend      { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
                  padding: 12px 16px; margin-bottom: 28px; font-size: 0.78rem; color: #888; }
  .legend b    { color: #f0a500; }
  .cost-bar    { background: #111; border: 1px solid #222; border-radius: 8px;
                  padding: 10px 16px; margin-bottom: 20px; font-size: 0.78rem; color: #666; }
  .cost-item   { margin-right: 4px; }
  .cost-item b { color: #e8e8e8; }
  .cost-sep    { margin: 0 8px; color: #333; }
  .cost-models { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
  .cost-model  { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 4px;
                  padding: 2px 8px; font-size: 0.72rem; color: #666; }
  .footer      { margin-top: 40px; font-size: 0.75rem; color: #555; }
  .oyster-bar  { background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 8px;
                  padding: 14px 16px; margin-bottom: 24px; }
  .oyster-title { font-size: 0.9rem; font-weight: 700; color: #7fff7f; margin-bottom: 8px; }
  .oyster-item { display: inline-block; background: #111; border: 1px solid #1e3a1e;
                  border-radius: 6px; padding: 4px 10px; margin: 3px; font-size: 0.75rem; color: #aaa; }
  .oyster-item b { color: #7fff7f; }
  .sources-bar { background: #111; border: 1px solid #222; border-radius: 8px;
                  padding: 10px 16px; margin-bottom: 20px; font-size: 0.78rem; color: #666; }
  .src-pill    { display: inline-block; background: #1e1e1e; border: 1px solid #2a2a2a;
                  border-radius: 99px; padding: 2px 10px; margin: 2px; font-size: 0.75rem; color: #aaa; }
  .show-more-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
                    padding: 8px 16px; color: #888; font-size: 0.8rem; cursor: pointer;
                    margin-bottom: 24px; display: block; width: 100%; text-align: left; }
  .show-more-btn:hover { border-color: #555; color: #ccc; }
  #extra-events { display: none; }
  .extra-label  { font-size: 0.72rem; color: #555; font-style: italic; margin-left: 6px; }
  .nav          { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }
  .nav-link     { padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; color: #666;
                   text-decoration: none; border: 1px solid transparent; }
  .nav-link:hover { color: #aaa; border-color: #333; }
  .nav-active   { padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
                   color: #f0a500; border: 1px solid #f0a50033; background: #f0a50011;
                   text-decoration: none; }
  .feedback     { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .fb-btn       { background: none; border: 1px solid #2a2a2a; border-radius: 99px;
                   padding: 3px 10px; font-size: 0.7rem; color: #555; cursor: pointer; }
  .fb-btn:hover { border-color: #555; color: #aaa; }
  .fb-btn.done  { border-color: #444; color: #7fff7f; }
  .fb-btn.skip  { border-color: #444; color: #ff7070; }
  #loading      { color: #555; font-size: 0.9rem; padding: 40px 0; }
</style>
</head>
<body>

  <nav class="nav">
    <a href="./index.html" class="nav-active">Brian</a>
    <a href="./chloe.html" class="nav-link">Chloe</a>
  </nav>

  <div id="loading">Loading events…</div>
  <div id="main" style="display:none">
    <h1>Boston Events</h1>
    <div class="sub" id="subtitle"></div>

    <div class="cost-bar" id="cost-bar"></div>

    <div class="sources-bar" id="sources-bar"></div>

    <div class="oyster-bar" id="oyster-bar"></div>

    <div class="legend">
      <b>Score 1–10</b> — how relevant this event is for you &nbsp;|&nbsp;
      <b>8–10</b> must consider &nbsp;·&nbsp;
      <b>5–7</b> worth knowing &nbsp;·&nbsp;
      <b>1–4</b> low priority
    </div>

    <div id="events-container"></div>

    <button class="show-more-btn" id="extra-btn" onclick="toggleExtra()" style="display:none"></button>
    <div id="extra-events"></div>

    <div class="footer" id="footer"></div>
  </div>

  <!-- Netlify form stub (hidden, required for form detection) -->
  <form name="event-feedback" data-netlify="true" netlify-honeypot="bot-field" style="display:none;position:absolute">
    <input type="hidden" name="form-name" value="event-feedback">
    <input name="bot-field">
    <input name="persona">
    <input name="vote">
    <input name="event_url">
    <input name="event_name">
  </form>

<script>
(function() {

  // ── Helpers ──────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtTime(isoStr) {
    if (!isoStr || isoStr.indexOf('T') === -1) return '';
    var timePart = isoStr.split('T')[1].substring(0, 5); // "HH:MM"
    var parts = timePart.split(':');
    var h = parseInt(parts[0], 10);
    var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m + ' ' + ampm;
  }

  function fmtDate(isoStr) {
    // Returns "Monday, March 24" from "2026-03-24T..." or "2026-03-24"
    var datePart = isoStr.split('T')[0];
    var parts = datePart.split('-');
    var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
  }

  function dateKey(isoStr) {
    return isoStr.split('T')[0];
  }

  function fmtRunTs(ts) {
    // ts like "2026-03-24T08:00" → "3/24 8:00 AM"
    var datePart = ts.split('T')[0];
    var dp = datePart.split('-');
    var m = parseInt(dp[1], 10);
    var d = parseInt(dp[2], 10);
    var time = ts.indexOf('T') !== -1 ? ts.split('T')[1].substring(0, 5) : '';
    var timeFmt = '';
    if (time) {
      var tp = time.split(':');
      var hh = parseInt(tp[0], 10);
      var mm = tp[1];
      var ampm = hh >= 12 ? 'PM' : 'AM';
      hh = hh % 12 || 12;
      timeFmt = hh + ':' + mm + ' ' + ampm;
    }
    return m + '/' + d + (timeFmt ? ' ' + timeFmt : '');
  }

  function fmtDuration(ms) {
    if (!ms && ms !== 0) return '—';
    return (ms / 1000).toFixed(1) + 's';
  }

  function fmtMoney(n) {
    if (n === undefined || n === null) return '$0.0000';
    return '$' + n.toFixed(4);
  }

  function buildMeta(ev) {
    var parts = [];
    var time = fmtTime(ev.start || '');
    if (time) parts.push(time);
    if (ev.price) parts.push(ev.price);
    if (ev.venue) parts.push(ev.venue);
    if (ev.address) parts.push(ev.address);
    return parts.join(' &nbsp;|&nbsp; ');
  }

  function buildCard(ev) {
    var meta = buildMeta(ev);
    var url = esc(ev.url || '');
    var name = esc(ev.name || '');
    return '<div class="card" data-url="' + url + '" data-name="' + name + '">' +
      '<div class="card-title">' + name +
        ' <span class="score" title="Relevance score 1-10">' + esc(ev.score) + '</span>' +
      '</div>' +
      (meta ? '<div class="meta">' + meta + '</div>' : '') +
      (ev.reason ? '<div class="reason">→ ' + esc(ev.reason) + '</div>' : '') +
      (ev.url ? '<a class="link" href="' + url + '" target="_blank">' + url + '</a>' : '') +
      '<div class="feedback">' +
        '<button class="fb-btn" data-p="brian" data-v="up">\uD83D\uDC4D Brian</button>' +
        '<button class="fb-btn" data-p="chloe" data-v="up">\uD83D\uDC4D Chloe</button>' +
        '<button class="fb-btn" data-p="brian" data-v="down">\uD83D\uDC4E Brian</button>' +
        '<button class="fb-btn" data-p="chloe" data-v="down">\uD83D\uDC4E Chloe</button>' +
      '</div>' +
    '</div>';
  }

  // ── Feedback ─────────────────────────────────────────────────────────────

  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.fb-btn');
    if (!btn) return;
    var card = btn.closest('.card');
    sendFeedback(btn, btn.dataset.p, btn.dataset.v, card.dataset.url, card.dataset.name);
  });

  function sendFeedback(btn, persona, vote, url, name) {
    btn.classList.add(vote === 'up' ? 'done' : 'skip');
    btn.disabled = true;
    fetch('/', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({'form-name':'event-feedback','persona':persona,'vote':vote,'event_url':url,'event_name':name}).toString()
    }).catch(function(){});
  }

  // ── Extra events toggle ───────────────────────────────────────────────────

  window.toggleExtra = function() {
    var el = document.getElementById('extra-events');
    var btn = document.getElementById('extra-btn');
    el.style.display = (el.style.display === 'none' || !el.style.display) ? 'block' : 'none';
    btn.textContent = el.style.display === 'block' ? '\u25B2 Hide lower-priority events' : btn.dataset.label;
  };

  // ── Render ────────────────────────────────────────────────────────────────

  function renderAll(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = '';

    // Subtitle
    var events = data.events || [];
    var today = data.today || '';
    var days = data.days || 7;
    var startDate = today;
    var endDateObj = new Date(today.split('-')[0], parseInt(today.split('-')[1],10)-1, parseInt(today.split('-')[2],10) + days - 1);
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    var endLabel = months[endDateObj.getMonth()] + ' ' + endDateObj.getDate();
    var startParts = today.split('-');
    var startLabel = months[parseInt(startParts[1],10)-1] + ' ' + parseInt(startParts[2],10);
    document.getElementById('subtitle').innerHTML =
      startLabel + ' \u2013 ' + endLabel + ', ' + startParts[0] +
      ' &nbsp;\u00B7&nbsp; ' + events.length + ' events';

    // Cost bar
    var costs = data.costs || {};
    var runs = (costs.runs || []).slice(-5).reverse();
    var costHtml = '<div style="display:flex;gap:20px;margin-bottom:10px">' +
      '<span class="cost-item">Week: <b>$' + (costs.week || 0).toFixed(4) + '</b></span>' +
      '<span class="cost-item">Month: <b>$' + (costs.month || 0).toFixed(4) + '</b></span>' +
      '<span class="cost-item">Total: <b>$' + (costs.total || 0).toFixed(4) + '</b></span>' +
    '</div>';
    if (runs.length) {
      costHtml += '<table style="width:100%;border-collapse:collapse;font-size:0.75rem;color:#888">' +
        '<thead><tr style="color:#555;text-align:left;border-bottom:1px solid #222">' +
          '<th style="padding:4px 8px 4px 0">Run</th>' +
          '<th style="padding:4px 8px">Events</th>' +
          '<th style="padding:4px 8px">Model</th>' +
          '<th style="padding:4px 8px">Cost</th>' +
          '<th style="padding:4px 8px">Time</th>' +
        '</tr></thead><tbody>';
      runs.forEach(function(run, i) {
        var models = run.models || {};
        var modelStr = Object.keys(models).map(function(k) {
          return esc(k) + ' ' + fmtMoney(models[k]);
        }).join(', ') || '\u2014';
        var isLatest = (i === 0);
        costHtml += '<tr' + (isLatest ? ' style="background:#1e2a1e"' : '') + '>' +
          '<td style="padding:4px 8px 4px 0">' + esc(fmtRunTs(run.ts || '')) +
            (isLatest ? ' <b style="color:#7fff7f;font-size:0.65rem">LATEST</b>' : '') +
          '</td>' +
          '<td style="color:#aaa;padding:4px 8px">' + (run.events_cached||0) + ' cached / ' + (run.events_scored||0) + ' scored</td>' +
          '<td style="color:#aaa;padding:4px 8px">' + modelStr + '</td>' +
          '<td style="color:#e8e8e8;font-weight:600;padding:4px 8px">' + fmtMoney(run.cost_usd) + '</td>' +
          '<td style="color:#666;padding:4px 8px">' + fmtDuration(run.duration_ms) + '</td>' +
        '</tr>';
      });
      costHtml += '</tbody></table>';
    }
    document.getElementById('cost-bar').innerHTML = costHtml;

    // Sources bar
    var sources = data.sources || {};
    var srcKeys = Object.keys(sources);
    var srcHtml = '';
    if (srcKeys.length) {
      srcHtml = srcKeys.map(function(k) {
        return '<span class="src-pill">' + esc(k) + ' ' + sources[k] + '</span>';
      }).join(' ');
    }
    var srcBar = document.getElementById('sources-bar');
    if (srcHtml) {
      srcBar.innerHTML = srcHtml;
    } else {
      srcBar.style.display = 'none';
    }

    // Oyster bar
    var oysters = data.oyster_deals || [];
    var oysterBar = document.getElementById('oyster-bar');
    if (oysters.length) {
      var oysterHtml = '<div class="oyster-title">\uD83E\uDDAA Oyster Deals</div>';
      oysterHtml += oysters.map(function(o) {
        return '<span class="oyster-item"><b>' + esc(o.name) + (o.deal ? ' \u2014 ' + esc(o.deal) : '') + '</b></span>';
      }).join('');
      oysterBar.innerHTML = oysterHtml;
    } else {
      oysterBar.style.display = 'none';
    }

    // Group events by date
    var groups = {};
    var order = [];
    events.forEach(function(ev) {
      var key = ev.start ? dateKey(ev.start) : (today || 'unknown');
      if (!groups[key]) {
        groups[key] = [];
        order.push(key);
      }
      groups[key].push(ev);
    });
    // Sort days chronologically
    order.sort();

    var eventsHtml = '';
    order.forEach(function(key) {
      var label = fmtDate(key);
      var isToday = (key === today);
      eventsHtml += '<div class="day-section">';
      eventsHtml += '<div class="day-header">' + esc(label) +
        (isToday ? ' <span class="today-tag">TODAY</span>' : '') +
      '</div>';
      groups[key].forEach(function(ev) {
        eventsHtml += buildCard(ev);
      });
      eventsHtml += '</div>';
    });
    document.getElementById('events-container').innerHTML = eventsHtml;

    // Extra events toggle
    var extra = data.extra_events || [];
    var extraBtn = document.getElementById('extra-btn');
    var extraContainer = document.getElementById('extra-events');
    if (extra.length) {
      var label = '\u25BC Show lower-priority events (' + extra.length + ')';
      extraBtn.textContent = label;
      extraBtn.dataset.label = label;
      extraBtn.style.display = 'block';
      var extraHtml = '<div class="day-section">';
      extraHtml += '<div class="day-header">Lower Priority <span class="extra-label">score 1\u20134</span></div>';
      extra.forEach(function(ev) {
        extraHtml += buildCard(ev);
      });
      extraHtml += '</div>';
      extraContainer.innerHTML = extraHtml;
    }

    // Footer
    var genAt = data.generated_at || '';
    var footerText = '';
    if (genAt) {
      var datePart2 = genAt.split('T')[0];
      var timePart2 = genAt.indexOf('T') !== -1 ? genAt.split('T')[1].substring(0,5) : '';
      var dp2 = datePart2.split('-');
      var d2 = new Date(parseInt(dp2[0],10), parseInt(dp2[1],10)-1, parseInt(dp2[2],10));
      var months2 = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
      var dateStr2 = months2[d2.getMonth()] + ' ' + d2.getDate() + ', ' + dp2[0];
      var timeStr2 = '';
      if (timePart2) {
        var tp2 = timePart2.split(':');
        var hh2 = parseInt(tp2[0],10);
        var mm2 = tp2[1];
        var ampm2 = hh2 >= 12 ? 'PM' : 'AM';
        hh2 = hh2 % 12 || 12;
        timeStr2 = hh2 + ':' + mm2 + ' ' + ampm2;
      }
      footerText = 'Generated ' + dateStr2 + (timeStr2 ? ' at ' + timeStr2 : '');
    }
    document.getElementById('footer').innerHTML = '<div class="footer">' + esc(footerText) + '</div>';
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────

  fetch('https://raw.githubusercontent.com/coffeethencode/boston-finder/data/data/brian.json?t=' + Math.floor(Date.now() / 300000))
    .then(function(r) { return r.json(); })
    .then(function(data) { renderAll(data); })
    .catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      document.body.innerHTML += '<p style="color:#f00">Failed to load events: ' + err + '</p>';
    });

})();
</script>
</body>
</html>
